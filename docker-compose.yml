services:
  db:
    image: postgres:16-alpine
    container_name: credenciamento_db
    environment:
      POSTGRES_DB: credenciamento
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d credenciamento"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: credenciamento_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/credenciamento?schema=public
      PORT: 3001
      JWT_SECRET: hackathon-secret-local
      JWT_EXPIRES_IN: 8h
      CORS_ORIGINS: http://localhost:5173
      ADMIN_EMAIL: admin@evento.com
      ADMIN_PASSWORD: Admin@123
      MASTER_EMAIL: master@evento.com
      MASTER_PASSWORD: Master@123
      GATE_EMAIL: gate@evento.com
      GATE_PASSWORD: Gate@123
      LEITOR_EMAIL: leitor@evento.com
      LEITOR_PASSWORD: Leitor@123
      GATE_START_HOUR: 0
      GATE_END_HOUR: 23
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - backup_data:/app/backups

  frontend:
    build:
      context: ./frontend
    container_name: credenciamento_frontend
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  backup_data:
